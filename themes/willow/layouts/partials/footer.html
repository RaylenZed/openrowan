<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <span class="footer-logo">◆ {{ .Site.Params.studioName }}</span>
      <p class="footer-copy">© {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
    </div>
    <div class="footer-right">
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</footer>
